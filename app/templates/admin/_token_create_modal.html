<!-- Create Token Modal -->
<div id="create-token-modal" class="fixed inset-0 bg-gray-600 bg-opacity-50 z-50 hidden" role="dialog" aria-modal="true" aria-labelledby="create-modal-title">
    <div class="relative top-20 mx-auto p-6 border max-w-md shadow-xl rounded-lg bg-white">
        <div class="flex justify-between items-center mb-4">
            <h3 id="create-modal-title" class="text-lg font-semibold text-gray-900">Create Token</h3>
            <button onclick="closeCreateModal()" class="text-gray-400 hover:text-gray-500">
                <i class="fas fa-times"></i>
            </button>
        </div>

        <form id="create-token-form">
            <div class="mb-4">
                <label for="token-name-input" class="block text-xs font-semibold text-gray-700 mb-1">Token Name (required)</label>
                <input type="text"
                       id="token-name-input"
                       name="name"
                       maxlength="100"
                       placeholder="e.g. ServiceNow Integration, Monitoring Script"
                       aria-required="true"
                       class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:border-ttcu-green text-sm">
                <p class="text-xs text-gray-500 mt-1">Choose a name that identifies the system or person using this token.</p>
            </div>

            <div id="create-token-error" class="hidden text-red-600 text-sm mb-4"></div>

            <div class="flex justify-end space-x-2">
                <button type="button"
                        onclick="closeCreateModal()"
                        class="px-4 py-2 bg-gray-200 text-gray-700 text-sm font-medium rounded-md hover:bg-gray-300 transition duration-150">
                    Cancel
                </button>
                <button type="button"
                        id="create-token-confirm"
                        disabled
                        hx-post="{{ url_for('admin.create_api_token') }}"
                        hx-include="#token-name-input"
                        hx-swap="none"
                        class="px-4 py-2 bg-ttcu-green text-white text-sm font-medium rounded-md hover:bg-green-700 transition duration-150 opacity-50 cursor-not-allowed">
                    Create Token
                </button>
            </div>
        </form>
    </div>
</div>
