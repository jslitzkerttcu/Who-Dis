<!-- Token Reveal Modal (One-Time Display) -->
<div id="reveal-token-modal" class="fixed inset-0 bg-gray-600 bg-opacity-50 z-50 hidden" role="dialog" aria-modal="true" aria-labelledby="reveal-modal-title">
    <div class="relative top-20 mx-auto p-6 border max-w-lg shadow-xl rounded-lg bg-white">
        <h3 id="reveal-modal-title" class="text-lg font-semibold text-gray-900 mb-4">Token Created</h3>

        <!-- Amber Warning -->
        <div class="bg-amber-50 border-l-4 border-amber-400 p-4 mb-4">
            <div class="flex items-start">
                <i class="fas fa-exclamation-triangle text-amber-600 mt-0.5 mr-3"></i>
                <p class="text-sm text-amber-800">Copy this token now. It will not be shown again after you close this dialog.</p>
            </div>
        </div>

        <!-- Token Display -->
        <div class="mb-4">
            <label class="block text-xs font-semibold text-gray-700 mb-1">Bearer Token</label>
            <div id="reveal-token-value" class="font-mono text-sm bg-gray-100 rounded border p-3 break-all select-all"></div>
        </div>

        <!-- Actions -->
        <div class="flex justify-between items-center">
            <button onclick="copyToken()"
                    id="copy-token-btn"
                    class="inline-flex items-center px-4 py-2 bg-white border border-gray-300 text-gray-700 text-sm font-medium rounded-md hover:bg-gray-50 transition duration-150">
                <i id="copy-token-icon" class="fas fa-copy mr-2"></i>
                <span id="copy-token-text">Copy</span>
            </button>
            <button onclick="closeRevealModal()"
                    class="px-4 py-2 bg-ttcu-green text-white text-sm font-medium rounded-md hover:bg-green-700 transition duration-150">
                Done -- I've Copied the Token
            </button>
        </div>
    </div>
</div>
