<!-- Revoke Token Confirmation Modal -->
<div id="revoke-token-modal" class="fixed inset-0 bg-gray-600 bg-opacity-50 z-50 hidden" role="dialog" aria-modal="true" aria-labelledby="revoke-modal-title">
    <div class="relative top-20 mx-auto p-6 border max-w-md shadow-xl rounded-lg bg-white">
        <div class="flex justify-between items-center mb-4">
            <h3 id="revoke-modal-title" class="text-lg font-semibold text-gray-900">Revoke Token</h3>
            <button onclick="closeRevokeModal()" class="text-gray-400 hover:text-gray-500">
                <i class="fas fa-times"></i>
            </button>
        </div>

        <p class="text-sm text-gray-600 mb-6">
            Revoke the token "<span id="revoke-token-name" class="font-semibold"></span>"? This cannot be undone. Any system using this token will immediately lose API access.
        </p>

        <div class="flex justify-end space-x-2">
            <button type="button"
                    onclick="closeRevokeModal()"
                    class="px-4 py-2 bg-gray-200 text-gray-700 text-sm font-medium rounded-md hover:bg-gray-300 transition duration-150">
                Cancel
            </button>
            <button type="button"
                    id="revoke-token-confirm"
                    hx-post=""
                    hx-swap="none"
                    class="px-4 py-2 bg-red-600 text-white text-sm font-medium rounded-md hover:bg-red-700 transition duration-150">
                Revoke Token
            </button>
        </div>
    </div>
</div>
