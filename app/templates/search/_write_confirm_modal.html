{# Shared confirmation modal for AD write actions (Phase 9).

Controlled via write-actions.js openWriteModal()/closeWriteModal().
The form submits via HTMX; HX-Trigger response header fires toast.
#}
<div id="write-confirm-modal"
     class="fixed inset-0 bg-gray-600 bg-opacity-50 z-50 hidden"
     role="dialog"
     aria-modal="true"
     aria-labelledby="write-modal-title"
     onclick="if(event.target===this) closeWriteModal()">
  <div class="relative top-20 mx-auto p-5 border max-w-md shadow-lg rounded-md bg-white"
       onclick="event.stopPropagation()">
    <!-- Header -->
    <div class="flex items-center justify-between mb-4">
      <h3 id="write-modal-title" class="text-lg font-semibold text-gray-900"></h3>
      <button type="button"
              class="text-gray-400 hover:text-gray-600"
              onclick="closeWriteModal()"
              aria-label="Close modal">
        <i class="fas fa-times"></i>
      </button>
    </div>

    <!-- Target user echo (D-01) -->
    <p id="write-modal-target" class="text-sm font-semibold text-gray-900 mt-2"></p>

    <!-- Risk warning for high-risk actions (D-14) -->
    <div id="write-modal-warning"
         class="bg-amber-50 border border-amber-400 text-amber-800 text-sm p-3 rounded mt-3 hidden">
      <i class="fas fa-exclamation-triangle mr-1"></i>
      This action will immediately affect the user's access.
    </div>

    <!-- Reason textarea (D-03) -->
    <div class="mt-4">
      <label for="write-modal-reason" class="text-xs font-semibold text-gray-700">
        Reason (required)
      </label>
      <textarea id="write-modal-reason"
                class="w-full border border-gray-300 rounded p-2 text-sm mt-1"
                placeholder="Why are you performing this action?"
                aria-required="true"
                rows="3"></textarea>
    </div>

    <!-- Hidden form for HTMX submission -->
    <form id="write-modal-form"
          hx-swap="none"
          hx-include="[name='_csrf_token']">
      <input type="hidden" name="user_dn" id="write-form-user-dn">
      <input type="hidden" name="display_name" id="write-form-display-name">
      <input type="hidden" name="user_email" id="write-form-user-email">
      <input type="hidden" name="reason" id="write-form-reason">
    </form>

    <!-- Button row -->
    <div class="flex justify-end gap-3 mt-5">
      <button type="button"
              class="px-4 py-2 text-sm font-medium text-gray-700 bg-gray-100 hover:bg-gray-200 rounded"
              onclick="closeWriteModal()">
        Cancel
      </button>
      <button type="button"
              id="write-modal-confirm"
              class="px-4 py-2 text-sm font-medium text-white rounded opacity-50 cursor-not-allowed bg-ttcu-green"
              disabled
              onclick="submitWriteAction()">
        Confirm
      </button>
    </div>
  </div>
</div>
