{# Dismissible temporary password display banner (D-05).

Appears after a successful password reset. Shows password in monospace,
with show/hide toggle and copy button. Never auto-dismisses.
#}
<div id="password-banner"
     class="fixed top-16 left-0 right-0 z-40 bg-blue-50 border-b-2 border-blue-400 p-4">
  <div class="max-w-4xl mx-auto flex items-center justify-between">
    <div class="flex items-center gap-3">
      <i class="fas fa-key text-blue-600 text-lg"></i>
      <div>
        <p class="font-semibold text-sm text-blue-900">Temporary Password</p>
        <div class="flex items-center gap-2 mt-1">
          <span id="password-display" class="font-mono text-lg text-gray-900">{{ password }}</span>
          <button type="button"
                  onclick="togglePasswordVisibility()"
                  class="text-blue-600 hover:text-blue-800 text-sm"
                  aria-label="Toggle password visibility"
                  title="Show/Hide password">
            <i id="password-toggle-icon" class="fas fa-eye-slash"></i>
          </button>
          <button type="button"
                  onclick="copyPassword()"
                  class="text-blue-600 hover:text-blue-800 text-sm"
                  aria-label="Copy password to clipboard"
                  title="Copy password">
            <i class="fas fa-copy"></i>
          </button>
        </div>
        <p class="text-xs text-gray-500 mt-1">This password will not be shown again after dismissal.</p>
      </div>
    </div>
    <a href="#"
       onclick="document.getElementById('password-banner').remove(); return false;"
       class="text-sm text-blue-600 hover:text-blue-800 underline ml-4">
      Dismiss
    </a>
  </div>
</div>
<script>
  setTimeout(function() {
    var banner = document.getElementById("password-banner");
    if (banner) banner.remove();
  }, 300000);
</script>
